name: hmm-kunitz
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - biopython>=1.81
  - numpy>=1.24
  - matplotlib>=3.7
  - jupyter
  - notebook
  - hmmer=3.4          # hmmbuild, hmmsearch
  - muscle             # multiple sequence alignment (v3 or v5)
  - cd-hit             # sequence clustering
  - blast              # BLASTp contamination filter
